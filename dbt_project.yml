name: 'oms_dbt_proj'
version: '1.0.0'
config-version: 2

profile: 'oms_dbt_proj'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"

models:
  oms_dbt_proj:
    +persist_docs:
      relation: true  # This pushes table/view level descriptions
      columns: true   # This pushes column-level descriptions
    profit_us:
      schema: MLTRAINING
      materialized: table
    profit_uk:
      schema: MLTRAINING
      materialized: table
    profit_india:
      schema: MLTRAINING
      materialized: table
    customers_stg:
      schema: L2_PROCESSING
    orders_stg:
      schema: L2_PROCESSING
    orderitems_stg:
      schema: L2_PROCESSING
    employees_stg:
      schema: L2_PROCESSING
    customerrevenue:
      materialized: table
    orders_fact:
      schema: L2_PROCESSING
      materialized: table
    storeperformance:
      materialized: table